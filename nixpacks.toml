[phases.setup]
nixPkgs = ['...']

[phases.install]
cmds = ['composer install --no-interaction --optimize-autoloader']

[phases.build]
cmds = ['php artisan config:cache', 'php artisan route:cache', 'php artisan view:cache']

[start]
cmd = 'mkdir -p storage/app/public/fonts storage/app/public/galleries storage/app/public/projects storage/app/public/services storage/app/public/materials storage/app/public/settings; cp -n resources/fonts/* storage/app/public/fonts/ 2>/dev/null; if [ -d public/storage ] && [ ! -L public/storage ]; then echo "Migrating public/storage files..."; cp -rn public/storage/* storage/app/public/ 2>/dev/null; rm -rf public/storage; fi; php artisan storage:link --force || echo "storage:link failed"; php artisan view:clear; php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=3000'
